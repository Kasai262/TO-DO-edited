<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Todo App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <h1>Todo List</h1>

      <!-- Main input form -->
      <form id="todoForm" class="todo-form">
        <input
          type="text"
          id="todoInput"
          placeholder="What needs to be done?"
          required
          minlength="3"
        />
        <input
          type="date"
          id="dueDateInput"
          required
        />
        <button type="submit" id="submitButton">Add Todo</button>
      </form>

      <!-- Search and sort zone -->
      <div class="utility-zone">
        <input
          type="text"
          id="findTaskInput"
          class="utility-bar"
          placeholder="Search tasks..."
        />
        <select id="sortPicker" class="utility-bar">
          <option value="none">Sort by date</option>
          <option value="asc">Oldest first</option>
          <option value="desc">Newest first</option>
        </select>
      </div>

      <!-- Filter and stats bar -->
      <div class="todo-controls">
        <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
        <button id="clearCompleted" class="clear-btn">Clear Completed</button>
      </div>

      <!-- Stats row -->
      <div class="stats-row">
        <span class="stat-pill">Total: <strong id="statTotal">0</strong></span>
        <span class="stat-pill">Active: <strong id="statActive">0</strong></span>
        <span class="stat-pill">Done: <strong id="statDone">0</strong></span>
      </div>

      <!-- Error message -->
      <div id="errorMessage" class="message error"></div>

      <!-- Todo list -->
      <div id="todoList"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
